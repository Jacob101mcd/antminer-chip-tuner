name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .

  tests:
    name: tests (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: pytest -q

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install build twine
      - run: python -m build
      - run: python -m twine check dist/*
      - name: Verify wheel contents
        run: |
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile

          wheel = next(Path("dist").glob("*.whl"))
          with ZipFile(wheel) as archive:
              names = set(archive.namelist())
          required = {
              "tuner_app/config/defaults.py",
              "tuner_app/miner/whatsminer.py",
              "tuner_app/static/dashboard.html",
              "tuner_app/static/js/main.js",
              "tuner_app/static/vendor/chart.umd.min.js",
          }
          missing = sorted(required - names)
          if missing:
              raise SystemExit(f"wheel is missing: {missing}")
          PY
      - name: Clean wheel install smoke test
        run: |
          python -m venv /tmp/antminer-wheel
          /tmp/antminer-wheel/bin/python -m pip install dist/*.whl
          cd /tmp
          /tmp/antminer-wheel/bin/python - <<'PY'
          from importlib.resources import files
          import tuner_app
          import tuner_app.config.defaults
          import tuner_app.main
          import tuner_app.miner.whatsminer

          assert files("tuner_app").joinpath("static/dashboard.html").is_file()
          PY
      - name: Generate SHA-256 checksums
        run: |
          python - <<'PY'
          from hashlib import sha256
          from pathlib import Path

          artifacts = sorted(path for path in Path("dist").iterdir() if path.is_file())
          lines = [f"{sha256(path.read_bytes()).hexdigest()}  {path.name}" for path in artifacts]
          Path("dist/CHECKSUMS.sha256").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: antminer-chip-tuner-dist
          path: dist/*
          if-no-files-found: error

  windows-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: python -c "import tuner_app.main; import tuner_app.miner.whatsminer"
      - run: pytest -q tests/unit

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install -e . pip-audit
      - run: pip-audit --skip-editable

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0

  secret-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_VERSION: 8.30.1
